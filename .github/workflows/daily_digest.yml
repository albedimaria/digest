name: Daily Digest

on:
  schedule:
    - cron: "0 5 * * *"   # ogni giorno alle 07:00 ora italiana (05:00 UTC estate, 06:00 inverno)
  workflow_dispatch:       # run manuale dalla UI di GitHub

jobs:
  send-digest:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # per committare history.json aggiornato

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run digest
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python digest.py

      - name: Persist history
        if: always()   # salva lo storico anche se l'invio è fallito a metà
        run: |
          if [[ -n "$(git status --porcelain history.json)" ]]; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add history.json
            git commit -m "chore: update history [skip ci]"
            git push
          else
            echo "history.json invariato, niente da committare"
          fi
